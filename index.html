<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <title>Študenti</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            text-align: center;
        }

        h1 {
            margin: 20px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            background: white;
            width: 220px;
            margin: 10px;
            padding: 10px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: 0.2s;
            cursor: pointer;
        }

        .card:hover {
            transform: scale(1.05);
        }

        img {
            width: 100%;
            border-radius: 10px;
        }

        button {
            padding: 10px 20px;
            margin: 15px;
            border: none;
            border-radius: 8px;
            background: #007bff;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        /* CHAT MODAL */
        #chatModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
        }

        #chatBox {
            background: white;
            width: 400px;
            margin: 50px auto;
            padding: 20px;
            border-radius: 10px;
            text-align: left;
        }

        #chatMessages {
            height: 200px;
            overflow-y: auto;
            border: 1px solid #ccc;
            padding: 10px;
            margin-bottom: 10px;
        }

        #chatMessages div {
            margin-bottom: 5px;
        }
    </style>
</head>

<body>

<h1>Zoznam študentov</h1>

<button onclick="loadStudents()">Načítať študentov</button>

<div class="container" id="students"></div>

<!-- CHAT -->
<div id="chatModal">
    <div id="chatBox">
        <h2 id="chatTitle"></h2>

        <div id="chatMessages"></div>

        <input id="chatInput" placeholder="Napíš správu..." style="width:70%;">
        <button onclick="sendMessage()">Odoslať</button>
        <button onclick="closeChat()">Zavrieť</button>
    </div>
</div>

<script>
    const API_URL = "https://backend-8lo7.onrender.com/api";
    const CHAT_URL = "https://backend-8lo7.onrender.com/chat";

    let currentStudent = null;

    async function loadStudents() {
        const container = document.getElementById("students");
        container.innerHTML = "⏳ Načítavam...";

        try {
            const response = await fetch(API_URL);
            const data = await response.json();

            container.innerHTML = "";

            data.students.forEach(student => {
                const div = document.createElement("div");
                div.className = "card";

                div.onclick = () => openChat(student);

                div.innerHTML = `
                    <img src="${student.image}" onerror="this.src='https://via.placeholder.com/220x150'">
                    <h3>${student.name} ${student.surname}</h3>
                    <p><b>Prezývka:</b> ${student.nickname || "-"}</p>
                `;

                container.appendChild(div);
            });

        } catch (error) {
            container.innerHTML = "❌ Nepodarilo sa načítať dáta";
            console.error(error);
        }
    }

    function openChat(student) {
        currentStudent = student;

        document.getElementById("chatModal").style.display = "block";
        document.getElementById("chatTitle").innerText =
            `Chat s ${student.name}`;

        document.getElementById("chatMessages").innerHTML = "";
    }

    function closeChat() {
        document.getElementById("chatModal").style.display = "none";
    }

    function addMessage(sender, text) {
        const chat = document.getElementById("chatMessages");
        const msg = document.createElement("div");

        msg.innerHTML = `<b>${sender}:</b> ${text}`;
        chat.appendChild(msg);

        chat.scrollTop = chat.scrollHeight;
    }

    async function sendMessage() {
        const input = document.getElementById("chatInput");
        const text = input.value;

        if (!text) return;

        addMessage("Ty", text);
        input.value = "";

        try {
            const response = await fetch(CHAT_URL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    message: text,
                    name: currentStudent.name,
                    personality: currentStudent.personality
                })
            });

            const data = await response.json();

            addMessage(
    currentStudent.name,
    data.reply || data.error || "❌ žiadna odpoveď"
);

        } catch (error) {
            addMessage("Systém", "❌ Chyba pri komunikácii so serverom");
            console.error(error);
        }
    }
</script>

</body>
</html>
